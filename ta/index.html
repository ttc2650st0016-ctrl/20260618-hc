<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>テキストの配置 text-align:</title>
</head>
<body>
   <h1>テキストの配置 text-align:</h1>  
   <link rel="stylesheet" href="style.css">

   <p class="left">これは左揃えの文章です。</p>
   <p class="center">これは中央揃えの文章です。</p>
<p class="right">これは右揃えの文章です。</p>
<p class="justify">
     この段落は両端揃えで表示されます。文章の左端と右端が揃うように、ブラウザが文字間や単語間を自動で調整します。
  両端揃えは雑誌や新聞、論文などの紙媒体のレイアウトでもよく使われ、整然とした印象を与える効果があります。
  Webデザインにおいては、視認性を重視する場合に注意が必要ですが、長文においては整列効果が発揮されます。
</p>

 <div class="Volcarona">
 <img src="Volcarona.jpg" alt="" width="500">
</div>
</body>
</html>
