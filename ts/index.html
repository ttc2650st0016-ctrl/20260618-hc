<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>テキストの影 text-shadow:</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>テキストの影 text-shadow:</h1>

  <h2 class="shadow-strong">Text Shadow - 強い影</h2>
  <h3 class="shadow-soft">Text Shadow - 柔らかい影</h3>
  <p class="shadow-light">この文章は薄い影が付けられています。</p>
</body>
</html>
